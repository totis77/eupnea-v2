<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>simsy viewer</title>
<style>
  :root {
    --bg: #0e1116; --panel: #171c24; --line: #2a323d; --ink: #e6edf3;
    --muted: #8b949e; --accent: #58a6ff; --ok: #3fb950; --warn: #d29922;
    --caffeine: #e8833a; --rest: #2dd4bf; --idle: #6e7681;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); color: var(--ink);
    font: 13px/1.45 ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  #app { display: grid; grid-template-columns: 1fr 280px; height: 100vh; }
  #stage { position: relative; }
  canvas { display: block; width: 100%; height: 100%; }
  #hud { position: absolute; top: 10px; left: 12px; font-variant-numeric: tabular-nums;
    color: var(--muted); pointer-events: none; }
  #hud b { color: var(--ink); }
  #status { display: inline-block; width: 8px; height: 8px; border-radius: 50%;
    background: var(--warn); margin-right: 6px; vertical-align: middle; }
  #status.on { background: var(--ok); }
  aside { background: var(--panel); border-left: 1px solid var(--line); overflow-y: auto; padding: 14px; }
  aside h2 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); margin: 0 0 8px; }
  .agent-card { border: 1px solid var(--line); border-radius: 8px; padding: 10px;
    margin-bottom: 10px; background: #0f141b; }
  .agent-card .name { font-weight: 600; display: flex; justify-content: space-between; }
  .agent-card .motive { font-size: 11px; color: var(--muted); margin: 2px 0 8px; }
  .tree { display: flex; gap: 4px; margin-bottom: 4px; }
  .tree.sub { margin-left: 10px; opacity: .92; }
  .tree.sub::before { content: "↳"; color: var(--muted); font-size: 10px; align-self: center; margin-right: 2px; }
  .tree .node { flex: 1; text-align: center; font-size: 10px; padding: 3px 2px;
    border: 1px solid var(--line); border-radius: 4px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .tree .node.active { background: rgba(63,185,80,.18); border-color: var(--ok); color: var(--ok); }
  .tree .node.done { color: var(--muted); border-color: var(--line); opacity: .5; }
  .tree .node.pending { color: var(--muted); opacity: .65; }
  .carry { font-size: 10px; color: var(--muted); margin: 0 0 8px; }
  .carry .item { color: #d2a8ff; border: 1px solid rgba(210,168,255,.4);
    border-radius: 8px; padding: 0 6px; margin-left: 4px; }
  .bar { display: flex; align-items: center; gap: 6px; margin: 3px 0; font-size: 11px; }
  .bar .label { width: 58px; color: var(--muted); }
  .bar .track { flex: 1; height: 7px; background: #20262e; border-radius: 4px; overflow: hidden; }
  .bar .fill { height: 100%; }
  .bar .val { width: 30px; text-align: right; font-variant-numeric: tabular-nums; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
</style>
</head>
<body>
<div id="app">
  <div id="stage">
    <canvas id="c"></canvas>
    <div id="hud"><span id="status"></span><b id="conn">connecting…</b> &nbsp; tick <b id="tick">–</b> &nbsp; <b id="time">–</b>s</div>
  </div>
  <aside>
    <h2>Agents — Behavior Trees</h2>
    <div id="cards"></div>
  </aside>
</div>
<script>
const WS_URL = "ws://localhost:8765";
const NEED_COLOR = { Caffeine: getC("--caffeine"), Rest: getC("--rest") };
function getC(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
function motiveColor(m){ return NEED_COLOR[m] || getC("--idle"); }

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let prev = null, cur = null, curAt = 0;
let interval = 100; // measured ms between snapshots; adapts to server snapshot_hz
let mouse = { x: -1, y: -1 };

// ---- world <-> screen ----------------------------------------------------
let view = { scale: 14, ox: 0, oy: 0 };
function resize(){
  const r = canvas.parentElement.getBoundingClientRect();
  canvas.width = r.width * devicePixelRatio;
  canvas.height = r.height * devicePixelRatio;
  view.scale = Math.min(canvas.width / 52, canvas.height / 24);
  view.ox = canvas.width / 2;
  view.oy = canvas.height / 2;
}
window.addEventListener("resize", resize);
function wx(x){ return view.ox + x * view.scale; }
function wy(y){ return view.oy - y * view.scale; }

// ---- websocket -----------------------------------------------------------
function connect(){
  const ws = new WebSocket(WS_URL);
  ws.onopen = () => { document.getElementById("status").classList.add("on");
    document.getElementById("conn").textContent = "live"; };
  ws.onclose = () => { document.getElementById("status").classList.remove("on");
    document.getElementById("conn").textContent = "reconnecting…"; setTimeout(connect, 800); };
  ws.onmessage = (e) => {
    const now = performance.now();
    if (cur) interval = Math.max(30, Math.min(1000, now - curAt));
    prev = cur || JSON.parse(e.data); cur = JSON.parse(e.data); curAt = now;
  };
}
connect();

// ---- interpolation -------------------------------------------------------
function lerp(a, b, t){ return a + (b - a) * t; }
function agentPos(a, t){
  const p = (prev.agents || []).find(x => x.id === a.id) || a;
  return [lerp(p.pos[0], a.pos[0], t), lerp(p.pos[1], a.pos[1], t)];
}

// ---- render --------------------------------------------------------------
function draw(){
  requestAnimationFrame(draw);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  if (!cur) return;
  const t = Math.max(0, Math.min(1, (performance.now() - curAt) / interval));
  ctx.save();
  ctx.scale(1, 1);
  drawGrid();
  for (const w of (cur.obstacles || [])) drawObstacle(w);

  // planned A* paths, drawn faintly under everything
  for (const a of cur.agents) drawPath(a);

  const objCenters = {};
  for (const o of cur.objects){ objCenters[o.id] = [wx(o.pos[0]), wy(o.pos[1])]; drawObject(o); }

  // tethers (agent -> reserved/occupied object), drawn under agents
  for (const a of cur.agents){
    if (!a.target || !objCenters[a.target]) continue;
    const [ax, ay] = agentPos(a, t).map((v, i) => i === 0 ? wx(v) : wy(v));
    const [ox, oy] = objCenters[a.target];
    drawTether(ax, ay, ox, oy, a);
  }

  let hovered = null, hoverDist = 22 * devicePixelRatio;
  for (const a of cur.agents){
    const [px, py] = agentPos(a, t);
    const sx = wx(px), sy = wy(py);
    drawAgent(sx, sy, a);
    const d = Math.hypot(sx - mouse.x, sy - mouse.y);
    if (d < hoverDist){ hoverDist = d; hovered = { a, sx, sy }; }
  }
  if (hovered) drawStatusUI(hovered);
  ctx.restore();

  document.getElementById("tick").textContent = cur.tick;
  document.getElementById("time").textContent = cur.time.toFixed(1);
  updateCards();
}

function drawGrid(){
  ctx.strokeStyle = "rgba(255,255,255,.04)"; ctx.lineWidth = 1;
  for (let x = -25; x <= 25; x += 5){ ctx.beginPath(); ctx.moveTo(wx(x), 0); ctx.lineTo(wx(x), canvas.height); ctx.stroke(); }
  for (let y = -10; y <= 10; y += 5){ ctx.beginPath(); ctx.moveTo(0, wy(y)); ctx.lineTo(canvas.width, wy(y)); ctx.stroke(); }
}

function drawObstacle(w){
  const [x0, y0, x1, y1] = w;
  const sx = wx(x0), sy = wy(y1), sw = (x1 - x0) * view.scale, sh = (y1 - y0) * view.scale;
  ctx.fillStyle = "#222a35"; ctx.fillRect(sx, sy, sw, sh);
  ctx.strokeStyle = "#39424f"; ctx.lineWidth = 1; ctx.strokeRect(sx, sy, sw, sh);
}

function drawPath(a){
  const p = a.path || [];
  if (p.length < 1) return;
  ctx.save();
  ctx.strokeStyle = motiveColor(a.motive); ctx.globalAlpha = 0.25;
  ctx.lineWidth = 1.5 * dpr();
  ctx.beginPath(); ctx.moveTo(wx(a.pos[0]), wy(a.pos[1]));
  for (const [x, y] of p) ctx.lineTo(wx(x), wy(y));
  ctx.stroke();
  ctx.fillStyle = motiveColor(a.motive);
  for (const [x, y] of p){ ctx.beginPath(); ctx.arc(wx(x), wy(y), 2.5 * dpr(), 0, Math.PI * 2); ctx.fill(); }
  ctx.restore();
}

function drawObject(o){
  const cx = wx(o.pos[0]), cy = wy(o.pos[1]);
  const w = 92 * dpr(), h = 46 * dpr();
  rrect(cx - w/2, cy - h/2, w, h, 8 * dpr());
  ctx.fillStyle = "#1b2230"; ctx.fill();
  ctx.strokeStyle = getC("--line"); ctx.lineWidth = 1.5; ctx.stroke();
  ctx.fillStyle = getC("--ink"); ctx.textAlign = "center";
  ctx.font = `${13 * dpr()}px ui-sans-serif`;
  ctx.fillText(o.kind, cx, cy - 4 * dpr());
  ctx.fillStyle = getC("--muted"); ctx.font = `${10 * dpr()}px ui-sans-serif`;
  ctx.fillText(o.affordances.join(", "), cx, cy + 9 * dpr());
  // queue-slot visualization: white = empty, blue = reserved/occupied
  // (skipped for high-capacity objects like exits, where it's meaningless)
  if (o.slots > 8) return;
  const used = o.slots - o.free, s = 10 * dpr(), gap = 4 * dpr();
  const totalW = o.slots * s + (o.slots - 1) * gap;
  let sx = cx - totalW / 2, sy = cy + h/2 + 7 * dpr();
  for (let i = 0; i < o.slots; i++){
    ctx.beginPath(); ctx.rect(sx, sy, s, s);
    ctx.fillStyle = i < used ? getC("--accent") : "#0e1116";
    ctx.fill(); ctx.strokeStyle = getC("--muted"); ctx.lineWidth = 1; ctx.stroke();
    sx += s + gap;
  }
}

function drawTether(ax, ay, ox, oy, a){
  ctx.save();
  ctx.strokeStyle = motiveColor(a.motive); ctx.globalAlpha = 0.55;
  ctx.shadowColor = motiveColor(a.motive); ctx.shadowBlur = 8 * dpr();
  ctx.lineWidth = 2 * dpr(); ctx.setLineDash([6 * dpr(), 5 * dpr()]);
  ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(ox, oy); ctx.stroke();
  ctx.restore();
  // floating label: motive + utility score
  const mx = (ax + ox) / 2, my = (ay + oy) / 2;
  const label = `${a.motive} [${a.score.toFixed(2)}]`;
  ctx.font = `${11 * dpr()}px ui-sans-serif`; ctx.textAlign = "center";
  const tw = ctx.measureText(label).width + 10 * dpr();
  rrect(mx - tw/2, my - 9 * dpr(), tw, 16 * dpr(), 4 * dpr());
  ctx.fillStyle = "rgba(0,0,0,.6)"; ctx.fill();
  ctx.fillStyle = motiveColor(a.motive); ctx.fillText(label, mx, my + 3 * dpr());
}

function drawAgent(sx, sy, a){
  const r = 11 * dpr();
  ctx.beginPath(); ctx.arc(sx, sy, r, 0, Math.PI * 2);
  ctx.fillStyle = motiveColor(a.motive); ctx.fill();
  ctx.strokeStyle = "#0e1116"; ctx.lineWidth = 2 * dpr(); ctx.stroke();
  ctx.fillStyle = getC("--ink"); ctx.textAlign = "center";
  ctx.font = `${11 * dpr()}px ui-sans-serif`;
  ctx.fillText(a.id, sx, sy - r - 4 * dpr());
}

function drawStatusUI(h){
  const { a, sx, sy } = h;
  const pad = 8 * dpr(), w = 150 * dpr(), needs = Object.entries(a.needs);
  const lh = 16 * dpr(), top = 24 * dpr();
  const hgt = top + needs.length * lh + pad;
  let x = sx + 16 * dpr(), y = sy - hgt / 2;
  if (x + w > canvas.width) x = sx - 16 * dpr() - w;
  rrect(x, y, w, hgt, 6 * dpr());
  ctx.fillStyle = "rgba(13,17,23,.94)"; ctx.fill();
  ctx.strokeStyle = getC("--line"); ctx.lineWidth = 1; ctx.stroke();
  ctx.textAlign = "left"; ctx.fillStyle = getC("--ink");
  ctx.font = `${12 * dpr()}px ui-sans-serif`;
  ctx.fillText(`${a.id} · ${a.motive || "idle"}`, x + pad, y + 15 * dpr());
  needs.forEach(([k, v], i) => {
    const by = y + top + i * lh;
    ctx.fillStyle = getC("--muted"); ctx.font = `${10 * dpr()}px ui-sans-serif`;
    ctx.fillText(k, x + pad, by + 8 * dpr());
    const bx = x + pad + 52 * dpr(), bw = w - 52 * dpr() - pad * 2 - 26 * dpr();
    ctx.fillStyle = "#20262e"; ctx.fillRect(bx, by + 2 * dpr(), bw, 7 * dpr());
    ctx.fillStyle = NEED_COLOR[k] || getC("--accent");
    ctx.fillRect(bx, by + 2 * dpr(), bw * v / 100, 7 * dpr());
    ctx.fillStyle = getC("--ink"); ctx.textAlign = "right";
    ctx.fillText(v.toFixed(0), x + w - pad, by + 8 * dpr()); ctx.textAlign = "left";
  });
}

// ---- side panel: live behavior trees ------------------------------------
// Render the agent's plan tree: each level is a row of step/leaf chips, and we
// recurse into the active child so a multi-step plan shows its steps AND the
// active step's leaves. Children before the active one are "done", after "pending".
function renderTree(node, sub){
  if (!node || !node.children) return "";
  const ai = node.active_index ?? 0;
  const row = node.children.map((c, i) => {
    const cls = i < ai ? "done" : (i === ai ? "active" : "pending");
    return `<div class="node ${cls}">${c.name}</div>`;
  }).join("");
  return `<div class="tree${sub ? " sub" : ""}">${row}</div>` +
    renderTree(node.children[ai], true);  // descend into the running child
}

function updateCards(){
  const root = document.getElementById("cards");
  root.innerHTML = cur.agents.map(a => {
    const tree = renderTree(a.plan, false) || `<div class="tree"><div class="node">idle</div></div>`;
    const carry = (a.carrying && a.carrying.length)
      ? `<div class="carry">carrying${a.carrying.map(i => `<span class="item">${i}</span>`).join("")}</div>`
      : "";
    const needs = Object.entries(a.needs).map(([k, v]) =>
      `<div class="bar"><span class="label">${k}</span>
        <span class="track"><span class="fill" style="width:${v}%;background:${NEED_COLOR[k] || '#58a6ff'}"></span></span>
        <span class="val">${v.toFixed(0)}</span></div>`).join("");
    return `<div class="agent-card">
      <div class="name"><span><span class="dot" style="background:${motiveColor(a.motive)}"></span> ${a.id}</span>
        <span style="color:var(--muted)">${a.motive ? a.score.toFixed(2) : ""}</span></div>
      <div class="motive">${a.motive ? `${a.motive} → ${a.target || "?"}` : "idle"}</div>
      ${tree}${carry}${needs}</div>`;
  }).join("");
}

function dpr(){ return devicePixelRatio; }
function rrect(x, y, w, h, r){ ctx.beginPath(); ctx.roundRect(x, y, w, h, r); }
canvas.addEventListener("mousemove", e => {
  const r = canvas.getBoundingClientRect();
  mouse.x = (e.clientX - r.left) * devicePixelRatio;
  mouse.y = (e.clientY - r.top) * devicePixelRatio;
});
canvas.addEventListener("mouseleave", () => { mouse.x = mouse.y = -1; });

resize();
requestAnimationFrame(draw);
</script>
</body>
</html>
