<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>simsy · scene editor</title>
<style>
  :root {
    --bg:#0b0e13; --panel:#0f141b; --line:#222a35; --ink:#e6edf3; --muted:#8b949e;
    --accent:#58a6ff; --ok:#3fb950; --sel:#d2a8ff; --wall:#222a35;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; height:100%; background:var(--bg); color:var(--ink);
    font-family: ui-sans-serif, system-ui, sans-serif; }
  #bar { display:flex; align-items:center; gap:10px; padding:8px 12px;
    border-bottom:1px solid var(--line); background:var(--panel); }
  #bar h1 { font-size:14px; margin:0 12px 0 0; font-weight:700; letter-spacing:.5px; }
  #bar select, #bar button { background:#0e1116; color:var(--ink); border:1px solid var(--line);
    border-radius:6px; padding:5px 10px; font-size:13px; cursor:pointer; }
  #bar button:hover { border-color:var(--accent); }
  #bar .spacer { flex:1; }
  #status { color:var(--muted); font-size:12px; min-width:90px; }
  #hint { color:var(--muted); font-size:12px; }
  #stage { position:relative; height:calc(100% - 95px); }
  canvas { width:100%; height:100%; display:block; cursor:default; }
  #inspect { position:absolute; right:10px; top:10px; width:250px; background:var(--panel);
    border:1px solid var(--line); border-radius:8px; padding:10px; font-size:12px; display:none; }
  #inspect h3 { margin:0 0 8px; font-size:13px; }
  #inspect label { display:flex; justify-content:space-between; align-items:center; gap:6px; margin:5px 0; color:var(--muted); }
  #inspect label.chk { justify-content:flex-start; }
  #inspect span { display:flex; gap:4px; }
  #inspect input { background:#0e1116; color:var(--ink); border:1px solid var(--line);
    border-radius:4px; padding:3px 5px; font-size:11px; width:130px; }
  #inspect input[type=number] { width:54px; }
  #inspect input[type=checkbox] { width:auto; }
  #pop { position:absolute; left:10px; top:10px; width:300px; max-height:calc(100% - 20px); overflow:auto;
    background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:10px; font-size:12px; display:none; }
  #pop h3 { margin:10px 0 6px; font-size:13px; } #pop h3:first-child { margin-top:0; }
  #pop label { display:flex; justify-content:space-between; align-items:center; gap:6px; margin:4px 0; color:var(--muted); }
  #pop input, #pop select { background:#0e1116; color:var(--ink); border:1px solid var(--line); border-radius:4px; padding:3px 5px; font-size:11px; width:150px; }
  #pop input[type=number]{ width:60px; } #pop input[type=checkbox]{ width:auto; }
  #pop .recipe { border:1px solid var(--line); border-radius:6px; padding:6px; margin:5px 0; }
  #pop .rhead { display:flex; gap:5px; align-items:center; margin-bottom:4px; }
  #pop .step { display:flex; gap:3px; margin:3px 0; }
  #pop .step input { width:60px; } #pop .step input.s-tag{ width:78px; } #pop .step select{ width:64px; }
  #pop button.mini { background:#0e1116; color:var(--muted); border:1px solid var(--line); border-radius:4px; cursor:pointer; font-size:11px; padding:2px 6px; }
  #pop button.mini:hover { border-color:var(--accent); color:var(--ink); }
</style>
</head>
<body>
  <div id="bar">
    <h1>simsy · scene editor</h1>
    <label style="color:var(--muted);font-size:12px">scene</label>
    <select id="project"></select>
    <button id="add">+ object</button>
    <button id="wall">+ wall</button>
    <button id="del">delete</button>
    <button id="popbtn">⚙ population</button>
    <div class="spacer"></div>
    <span id="status"></span>
    <button id="run">▶ Run</button>
    <button id="save">Save</button>
  </div>
  <div id="hint" style="padding:4px 12px">Drag an object to move it · click to select · Delete key removes it · Save writes scene.yaml (.bak kept)</div>
  <div id="stage">
    <canvas id="c"></canvas>
    <div id="inspect"></div>
    <div id="pop"></div>
  </div>
<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");
let scene = null, project = null, sel = null, drag = null, draw = null, mode = "select";

function dpr(){ return devicePixelRatio || 1; }
function resize(){ canvas.width = canvas.clientWidth*dpr(); canvas.height = canvas.clientHeight*dpr(); render(); }
addEventListener("resize", resize);

// ---- world <-> screen transform (fit scene bounds with a margin) ---------
function view(){
  const [minx,miny,maxx,maxy] = scene.world.bounds;
  const m = 40*dpr();
  const s = Math.min((canvas.width-2*m)/(maxx-minx), (canvas.height-2*m)/(maxy-miny));
  return { minx,miny,maxx,maxy,m,s };
}
function wx(x){ const v=view(); return v.m + (x-v.minx)*v.s; }
function wy(y){ const v=view(); return canvas.height - v.m - (y-v.miny)*v.s; }
function ux(px){ const v=view(); return v.minx + (px-v.m)/v.s; }
function uy(py){ const v=view(); return v.miny + (canvas.height - v.m - py)/v.s; }

// ---- load / save ---------------------------------------------------------
async function loadScenes(){
  const { scenes } = await (await fetch("/scenes")).json();
  const sel = document.getElementById("project");
  sel.innerHTML = scenes.map(s => `<option>${s}</option>`).join("");
  const wanted = new URLSearchParams(location.search).get("project");
  if (wanted && scenes.includes(wanted)) sel.value = wanted;
  await loadScene(sel.value);
}
async function loadScene(name){
  project = name;
  scene = await (await fetch(`/scene/${name}`)).json();
  scene.objects = scene.objects || [];
  scene.walls = scene.walls || [];
  sel = null; updateInspect(); status(`loaded ${name}`);
  render();
}
async function save(){
  status("saving…");
  const res = await fetch(`/scene/${project}`, {
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(scene),
  });
  status(res.ok ? "saved ✓" : "save failed");
}
function status(t){ document.getElementById("status").textContent = t; }

// ---- rendering -----------------------------------------------------------
function wallRect(w){ // screen rect from a wall, tolerant of inverted coords
  const x0=Math.min(w[0],w[2]), x1=Math.max(w[0],w[2]), y0=Math.min(w[1],w[3]), y1=Math.max(w[1],w[3]);
  return { sx:wx(x0), sy:wy(y1), sw:(x1-x0)*view().s, sh:(y1-y0)*view().s };
}
function render(){
  if (!scene) return;
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // walls (selected one shows a resize handle at its far corner)
  (scene.walls||[]).forEach((w,i)=>{
    const {sx,sy,sw,sh}=wallRect(w), on = sel&&sel.t==="wall"&&sel.i===i;
    ctx.fillStyle="#222a35"; ctx.fillRect(sx,sy,sw,sh);
    ctx.lineWidth=on?2.5:1; ctx.strokeStyle=on?getCss("--sel"):"#39424f"; ctx.strokeRect(sx,sy,sw,sh);
    if (on){ const hx=wx(w[2]), hy=wy(w[3]); ctx.fillStyle=getCss("--sel"); ctx.fillRect(hx-5*dpr(),hy-5*dpr(),10*dpr(),10*dpr()); }
  });
  // wall-draw preview
  if (draw){
    const {sx,sy,sw,sh}=wallRect([draw.x0,draw.y0,draw.x1,draw.y1]);
    ctx.strokeStyle=getCss("--sel"); ctx.setLineDash([5*dpr(),4*dpr()]); ctx.lineWidth=1.5;
    ctx.strokeRect(sx,sy,sw,sh); ctx.setLineDash([]);
  }
  // entrance (spawner)
  if (scene.spawner && scene.spawner.entrance){
    const [ex,ey]=scene.spawner.entrance, on = sel&&sel.t==="entrance";
    ctx.fillStyle=on?getCss("--sel"):"#1f6feb"; ctx.beginPath(); ctx.arc(wx(ex),wy(ey),7*dpr(),0,7); ctx.fill();
    ctx.fillStyle="#8b949e"; ctx.font=`${11*dpr()}px ui-sans-serif`; ctx.textAlign="center";
    ctx.fillText("entrance", wx(ex), wy(ey)+19*dpr());
  }
  // fixed agents (staff)
  for (const a of (scene.agents||[])){
    ctx.fillStyle="#d29922"; ctx.beginPath(); ctx.arc(wx(a.pos[0]),wy(a.pos[1]),6*dpr(),0,7); ctx.fill();
    ctx.fillStyle="#8b949e"; ctx.font=`${10*dpr()}px ui-sans-serif`; ctx.textAlign="center";
    ctx.fillText(a.id, wx(a.pos[0]), wy(a.pos[1])-9*dpr());
  }
  // objects
  for (const o of scene.objects){
    const cx=wx(o.pos[0]), cy=wy(o.pos[1]), w=92*dpr(), h=42*dpr(), on = sel&&sel.t==="object"&&sel.o===o;
    ctx.beginPath(); ctx.roundRect(cx-w/2,cy-h/2,w,h,7*dpr());
    ctx.fillStyle="#1b2230"; ctx.fill();
    ctx.lineWidth=on?2.5:1.5; ctx.strokeStyle=on?getCss("--sel"):getCss("--line"); ctx.stroke();
    ctx.fillStyle=getCss("--ink"); ctx.textAlign="center"; ctx.font=`${12*dpr()}px ui-sans-serif`;
    ctx.fillText(o.kind||o.id, cx, cy-3*dpr());
    ctx.fillStyle=getCss("--muted"); ctx.font=`${9*dpr()}px ui-sans-serif`;
    const tags=(o.tags||[]).join(",");
    ctx.fillText(`${o.id}${o.slots?` ·${o.slots}`:""}${tags?` ·${tags}`:""}`, cx, cy+9*dpr());
  }
}
function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }

// ---- selection / drag (objects · walls · entrance) -----------------------
function evpos(e){ const r=canvas.getBoundingClientRect(); return [(e.clientX-r.left)*dpr(), (e.clientY-r.top)*dpr()]; }
function hit(px,py){
  for (let i=scene.objects.length-1;i>=0;i--){
    const o=scene.objects[i];
    if (Math.abs(px-wx(o.pos[0]))<=46*dpr() && Math.abs(py-wy(o.pos[1]))<=21*dpr()) return {t:"object", o};
  }
  for (let i=(scene.walls||[]).length-1;i>=0;i--){
    const {sx,sy,sw,sh}=wallRect(scene.walls[i]);
    if (px>=sx&&px<=sx+sw&&py>=sy&&py<=sy+sh) return {t:"wall", i};
  }
  if (scene.spawner && scene.spawner.entrance){
    const [ex,ey]=scene.spawner.entrance;
    if (Math.hypot(px-wx(ex),py-wy(ey))<=11*dpr()) return {t:"entrance"};
  }
  return null;
}
function onHandle(px,py){ // cursor over the selected wall's resize handle?
  if (!sel||sel.t!=="wall") return false;
  const w=scene.walls[sel.i];
  return Math.abs(px-wx(w[2]))<=7*dpr() && Math.abs(py-wy(w[3]))<=7*dpr();
}
canvas.addEventListener("mousedown", e=>{
  const [px,py]=evpos(e);
  if (mode==="wall"){ const x=+ux(px).toFixed(2), y=+uy(py).toFixed(2); draw={x0:x,y0:y,x1:x,y1:y}; return; }
  if (onHandle(px,py)){ drag={resize:true}; return; }
  sel = hit(px,py);
  if (sel){
    if (sel.t==="object") drag={dx:px-wx(sel.o.pos[0]), dy:py-wy(sel.o.pos[1])};
    else if (sel.t==="entrance"){ const en=scene.spawner.entrance; drag={dx:px-wx(en[0]), dy:py-wy(en[1])}; }
    else if (sel.t==="wall") drag={px:ux(px), py:uy(py)};  // for move delta
  }
  updateInspect(); render();
});
canvas.addEventListener("mousemove", e=>{
  const [px,py]=evpos(e);
  if (draw){ draw.x1=+ux(px).toFixed(2); draw.y1=+uy(py).toFixed(2); render(); return; }
  if (!drag||!sel) return;
  if (drag.resize && sel.t==="wall"){ const w=scene.walls[sel.i]; w[2]=+ux(px).toFixed(2); w[3]=+uy(py).toFixed(2); }
  else if (sel.t==="object") sel.o.pos=[+ux(px-drag.dx).toFixed(2), +uy(py-drag.dy).toFixed(2)];
  else if (sel.t==="entrance") scene.spawner.entrance=[+ux(px-drag.dx).toFixed(2), +uy(py-drag.dy).toFixed(2)];
  else if (sel.t==="wall"){
    const nx=ux(px), ny=uy(py), dx=nx-drag.px, dy=ny-drag.py, w=scene.walls[sel.i];
    scene.walls[sel.i]=[+(w[0]+dx).toFixed(2), +(w[1]+dy).toFixed(2), +(w[2]+dx).toFixed(2), +(w[3]+dy).toFixed(2)];
    drag.px=nx; drag.py=ny;
  }
  updateInspect(); render();
});
addEventListener("mouseup", ()=>{
  if (draw){
    const x0=Math.min(draw.x0,draw.x1), x1=Math.max(draw.x0,draw.x1), y0=Math.min(draw.y0,draw.y1), y1=Math.max(draw.y0,draw.y1);
    if ((x1-x0)>0.3 && (y1-y0)>0.3){ scene.walls.push([x0,y0,x1,y1]); sel={t:"wall", i:scene.walls.length-1}; }
    draw=null; setMode("select"); updateInspect(); render();
  } else if (drag && drag.resize && sel && sel.t==="wall"){  // normalize after resize
    const w=scene.walls[sel.i];
    scene.walls[sel.i]=[Math.min(w[0],w[2]),Math.min(w[1],w[3]),Math.max(w[0],w[2]),Math.max(w[1],w[3])];
  }
  drag=null;
});
addEventListener("keydown", e=>{
  if (e.key!=="Delete" && e.key!=="Backspace") return;
  if (!sel || (document.activeElement && document.activeElement.tagName==="INPUT")) return;
  if (sel.t==="object") scene.objects=scene.objects.filter(o=>o!==sel.o);
  else if (sel.t==="wall") scene.walls.splice(sel.i,1);
  else return;  // entrance can't be deleted
  sel=null; updateInspect(); render();
});

const g = id => document.getElementById(id);
function updateInspect(){
  const el=document.getElementById("inspect");
  if (!sel){ el.style.display="none"; return; }
  el.style.display="block";
  if (sel.t==="object") inspectObject(el, sel.o);
  else if (sel.t==="wall") inspectWall(el, sel.i);
  else if (sel.t==="entrance") inspectEntrance(el);
}

function inspectObject(el, o){
  const aff = Object.entries(o.affordances||{}).map(([k,v])=>`${k}:${v}`).join(", ");
  el.innerHTML = `
    <h3>object</h3>
    <label>id <input id="f-id" value="${o.id}"></label>
    <label>kind <input id="f-kind" value="${o.kind||''}"></label>
    <label>pos <span><input id="f-px" type="number" step="0.5" value="${o.pos[0]}"><input id="f-py" type="number" step="0.5" value="${o.pos[1]}"></span></label>
    <label>slots <input id="f-slots" type="number" min="1" value="${o.slots??1}"></label>
    <label>tags <input id="f-tags" value="${(o.tags||[]).join(', ')}" placeholder="seat, sells:coffee"></label>
    <label>afford. <input id="f-aff" value="${aff}" placeholder="Caffeine:40"></label>
    <label class="chk"><input type="checkbox" id="f-queue" ${o.queue?'checked':''}> queue</label>
    <label class="chk"><input type="checkbox" id="f-service" ${o.service?'checked':''}> service</label>
    <label class="chk"><input type="checkbox" id="f-despawn" ${o.despawns?'checked':''}> despawns (exit)</label>
    <label class="chk"><input type="checkbox" id="f-portal" ${o.portal?'checked':''}> portal</label>
    <label id="f-portal-row" style="${o.portal?'':'display:none'}">target <span><input id="f-tx" type="number" step="0.5" value="${o.portal?o.portal.target[0]:0}"><input id="f-ty" type="number" step="0.5" value="${o.portal?o.portal.target[1]:0}"></span></label>`;
  el.querySelectorAll("input").forEach(inp => inp.addEventListener("input", ()=>applyObject(o)));
}
function applyObject(o){
  o.id = g("f-id").value || o.id;
  o.kind = g("f-kind").value;
  o.pos = [ +g("f-px").value, +g("f-py").value ];
  o.slots = Math.max(1, +g("f-slots").value || 1);
  const tags = g("f-tags").value.split(",").map(s=>s.trim()).filter(Boolean);
  tags.length ? o.tags=tags : delete o.tags;
  const aff={}; g("f-aff").value.split(",").map(s=>s.trim()).filter(Boolean)
    .forEach(p=>{ const [k,v]=p.split(":"); if (k) aff[k.trim()] = +(v||0); });
  Object.keys(aff).length ? o.affordances=aff : delete o.affordances;
  g("f-queue").checked ? (o.queue = o.queue||{direction:[-1,0],spacing:1.5,gap:2.0}) : delete o.queue;
  g("f-service").checked ? (o.service = o.service||{pickup_offset:[0,-3]}) : delete o.service;
  g("f-despawn").checked ? (o.despawns=true) : delete o.despawns;
  g("f-portal").checked ? (o.portal = o.portal||{target:[0,0]}) : delete o.portal;
  g("f-portal-row").style.display = g("f-portal").checked ? "" : "none";
  if (o.portal) o.portal.target = [ +g("f-tx").value, +g("f-ty").value ];
  render();
}
function inspectWall(el, i){
  const w=scene.walls[i];
  el.innerHTML = `
    <h3>wall</h3>
    <label>x0,y0 <span><input id="w-x0" type="number" step="0.5" value="${w[0]}"><input id="w-y0" type="number" step="0.5" value="${w[1]}"></span></label>
    <label>x1,y1 <span><input id="w-x1" type="number" step="0.5" value="${w[2]}"><input id="w-y1" type="number" step="0.5" value="${w[3]}"></span></label>`;
  el.querySelectorAll("input").forEach(inp => inp.addEventListener("input", ()=>{
    scene.walls[i] = [+g("w-x0").value, +g("w-y0").value, +g("w-x1").value, +g("w-y1").value]; render();
  }));
}
function inspectEntrance(el){
  const en=scene.spawner.entrance;
  el.innerHTML = `
    <h3>entrance</h3>
    <label>x,y <span><input id="e-x" type="number" step="0.5" value="${en[0]}"><input id="e-y" type="number" step="0.5" value="${en[1]}"></span></label>`;
  el.querySelectorAll("input").forEach(inp => inp.addEventListener("input", ()=>{
    scene.spawner.entrance = [+g("e-x").value, +g("e-y").value]; render();
  }));
}

async function run(){
  status("starting…");
  const res = await fetch("/run", {
    method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify(scene),
  });
  if (res.ok) location.href = "/index.html";
  else { const e = await res.json().catch(()=>({})); status("run failed: " + (e.error||"")); }
}

function setMode(m){
  mode = m;
  canvas.style.cursor = m==="wall" ? "crosshair" : "default";
  document.getElementById("wall").style.borderColor = m==="wall" ? getCss("--accent") : "";
}
document.getElementById("project").addEventListener("change", e=>loadScene(e.target.value));
document.getElementById("save").addEventListener("click", save);
document.getElementById("run").addEventListener("click", run);
document.getElementById("wall").addEventListener("click", ()=>setMode(mode==="wall"?"select":"wall"));
document.getElementById("del").addEventListener("click", ()=>{
  if (!sel) return;
  if (sel.t==="object") scene.objects=scene.objects.filter(o=>o!==sel.o);
  else if (sel.t==="wall") scene.walls.splice(sel.i,1);
  else return;
  sel=null; updateInspect(); render();
});
document.getElementById("add").addEventListener("click", ()=>{
  const v=view(), cx=(v.minx+v.maxx)/2, cy=(v.miny+v.maxy)/2;
  let n=1; while (scene.objects.some(o=>o.id===`object${n}`)) n++;
  const o={ id:`object${n}`, kind:"Object", pos:[+cx.toFixed(2),+cy.toFixed(2)], slots:1 };
  scene.objects.push(o); sel={t:"object", o}; updateInspect(); render();
});

// ---- population: spawner · archetypes · recipes (4F) ---------------------
let currentArch = null;
const ACTIONS = ["acquire","consume","use","enter"];
const kvStr = o => Object.entries(o||{}).map(([k,v])=>`${k}:${v}`).join(", ");
function parseKV(s){ const o={}; s.split(",").map(x=>x.trim()).filter(Boolean)
  .forEach(p=>{ const [k,v]=p.split(":"); if (k) o[k.trim()]=+(v||0); }); return o; }

function togglePop(){
  const el=document.getElementById("pop");
  const show = !(el.style.display==="block");
  el.style.display = show ? "block" : "none";
  document.getElementById("popbtn").style.borderColor = show ? getCss("--accent") : "";
  if (show){ sel=null; updateInspect(); renderPopulation(); }
}

function renderPopulation(){
  const el=document.getElementById("pop");
  scene.archetypes = scene.archetypes || {};
  scene.spawner = scene.spawner || {};
  const names = Object.keys(scene.archetypes);
  if (!currentArch || !names.includes(currentArch)) currentArch = names[0] || null;
  const sp = scene.spawner;
  let html = `<h3>spawner</h3>
    <label>archetype <select id="p-arch-sel">${names.map(n=>`<option ${n===sp.archetype?'selected':''}>${n}</option>`).join("")}</select></label>
    <label>max pop <input id="p-max" type="number" value="${sp.max_population??8}"></label>
    <label>initial <input id="p-init" type="number" value="${sp.initial??0}"></label>
    <label>interval <span><input id="p-i0" type="number" value="${(sp.interval_ticks||[15,45])[0]}"><input id="p-i1" type="number" value="${(sp.interval_ticks||[15,45])[1]}"></span></label>`;
  if (currentArch){
    const a = scene.archetypes[currentArch];
    const recs = a.recipes||{};
    html += `<h3>archetype <select id="p-edit-sel">${names.map(n=>`<option ${n===currentArch?'selected':''}>${n}</option>`).join("")}</select></h3>
      <label>needs <input id="p-needs" value="${kvStr(a.needs)}" placeholder="Caffeine:60"></label>
      <label>growth <input id="p-growth" value="${kvStr(a.growth)}" placeholder="Caffeine:1"></label>
      <label class="chk"><input type="checkbox" id="p-mood" ${a.with_mood?'checked':''}> with mood</label>
      <h3>recipes <button class="mini" id="p-addrec">+ recipe</button></h3>` +
      Object.keys(recs).map(need=>`<div class="recipe" data-need="${need}">
        <div class="rhead">need <input class="r-need" value="${need}"><button class="mini r-addstep">+ step</button><button class="mini r-del">×</button></div>
        <div class="steps">${recs[need].map(st=>`<div class="step">
          <input class="s-tag" value="${st.tag||''}" placeholder="tag">
          <select class="s-action">${ACTIONS.map(x=>`<option ${x===st.action?'selected':''}>${x}</option>`).join("")}</select>
          <input class="s-item" value="${st.item||''}" placeholder="item">
          <input class="s-amount" type="number" value="${st.amount||0}">
          <button class="mini s-del">×</button></div>`).join("")}</div></div>`).join("");
  }
  el.innerHTML = html;

  el.querySelectorAll("input,select").forEach(inp=>{
    if (inp.id==="p-arch-sel") inp.addEventListener("change", ()=>{ scene.spawner.archetype=inp.value; });
    else if (inp.id==="p-edit-sel") inp.addEventListener("change", ()=>{ applyPopulation(); currentArch=inp.value; renderPopulation(); });
    else { inp.addEventListener("input", applyPopulation); inp.addEventListener("change", applyPopulation); }
  });
  el.querySelectorAll(".s-del").forEach(b=>b.addEventListener("click", e=>{ e.target.closest(".step").remove(); applyPopulation(); }));
  el.querySelectorAll(".r-addstep").forEach(b=>b.addEventListener("click", e=>{
    applyPopulation(); const need=e.target.closest(".recipe").querySelector(".r-need").value.trim();
    const recs=scene.archetypes[currentArch].recipes; if (recs[need]) recs[need].push({tag:"",action:"acquire"}); renderPopulation();
  }));
  el.querySelectorAll(".r-del").forEach(b=>b.addEventListener("click", e=>{
    applyPopulation(); const need=e.target.closest(".recipe").querySelector(".r-need").value.trim();
    delete scene.archetypes[currentArch].recipes[need]; renderPopulation();
  }));
  const addrec=document.getElementById("p-addrec");
  if (addrec) addrec.addEventListener("click", ()=>{
    applyPopulation(); const a=scene.archetypes[currentArch]; a.recipes=a.recipes||{};
    let k="need", i=1; while (a.recipes[k]) k="need"+(i++); a.recipes[k]=[]; renderPopulation();
  });
}

function applyPopulation(){
  const g=id=>document.getElementById(id), sp=scene.spawner;
  sp.max_population = +g("p-max").value||0;
  sp.initial = +g("p-init").value||0;
  sp.interval_ticks = [ +g("p-i0").value||0, +g("p-i1").value||0 ];
  if (!currentArch) return;
  const a=scene.archetypes[currentArch];
  a.needs = parseKV(g("p-needs").value);
  a.growth = parseKV(g("p-growth").value);
  g("p-mood").checked ? (a.with_mood=true) : delete a.with_mood;
  const recipes={};
  document.querySelectorAll("#pop .recipe").forEach(r=>{
    const need=r.querySelector(".r-need").value.trim(); if (!need) return;
    recipes[need] = [...r.querySelectorAll(".step")].map(s=>{
      const st={ tag:s.querySelector(".s-tag").value.trim(), action:s.querySelector(".s-action").value };
      const item=s.querySelector(".s-item").value.trim(); if (item) st.item=item;
      const amt=+s.querySelector(".s-amount").value; if (amt) st.amount=amt;
      return st;
    });
  });
  Object.keys(recipes).length ? (a.recipes=recipes) : delete a.recipes;
}
document.getElementById("popbtn").addEventListener("click", togglePop);

loadScenes().then(resize);
</script>
</body>
</html>
